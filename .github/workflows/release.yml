name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  Build-Binaries:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    container:
      image: ${{ matrix.container }}
    strategy:
      matrix:
        include:
          # GNU builds on AlmaLinux 8 (glibc 2.28)
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            container: almalinux:8
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            container: almalinux:8
          - runner: macos-15
            target: aarch64-apple-darwin
            container: ""
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            container: ""
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
            container: ""

    steps:
      - name: Install dependencies (AlmaLinux)
        if: matrix.container != ''
        run: |
          dnf install -y gcc gcc-c++ make git curl tar gzip clang llvm unzip perl-IPC-Cmd

      - name: Install Rust
        if: runner.os != 'Windows'
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python (for tag check)
        if: matrix.container != '' && github.ref_type == 'tag'
        run: |
          dnf install -y python3

      - name: Check version matches tag
        if: ${{ github.ref_type == 'tag' }}
        run: |
          python3 .github/scripts/tag_check.py "${{ github.ref_name }}"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'

      - name: Install dependencies
        working-directory: ui
        run: bun install

      - name: Cargo build (Unix)
        if: runner.os != 'Windows'
        run: |
          . "$HOME/.cargo/env"
          cargo build --all --features=ui,cli --release --target ${{ matrix.target }}

      - name: Cargo build (Windows)
        if: runner.os == 'Windows'
        run: cargo build --all --features=ui,cli --release --target ${{ matrix.target }}

      - name: Prepare binary for upload (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.target }}/release/ghqc artifacts/ghqc-${{ matrix.target }}

      - name: Prepare binary for upload (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.target }}/release/ghqc.exe artifacts/ghqc-${{ matrix.target }}.exe

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 1

  # Stage 2: Create GitHub Release with all artifacts
  Create-Release:
    needs: [Build-Binaries]
    runs-on: ubuntu-latest
    if: ${{ github.ref_type == 'tag' }}
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "binary-*"
          path: ./release-assets
          merge-multiple: true

      - name: Create tarballs
        run: |
          cd release-assets

          for binary in ghqc-*; do
            [[ "$binary" == *.exe ]] && continue
            target="${binary#ghqc-}"
            tmpdir="tmp_${target}"
            mkdir -p "$tmpdir"
            cp "$binary" "$tmpdir/ghqc"
            chmod +x "$tmpdir/ghqc"
            tar -czf "ghqc-${{ github.ref_name }}-${target}.tar.gz" -C "$tmpdir" ghqc
            rm -rf "$tmpdir"
          done

          # Windows zip
          if [ -f "ghqc-x86_64-pc-windows-msvc.exe" ]; then
            zip "ghqc-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip" ghqc-x86_64-pc-windows-msvc.exe
          fi

          # Remove raw binaries
          rm -f ghqc-*-unknown-linux-gnu ghqc-*-apple-darwin ghqc-*-windows-msvc.exe

          ls -lah

      - name: Generate checksums
        run: |
          cd release-assets
          for f in *.tar.gz *.zip; do
            [ -f "$f" ] && sha256sum "$f"
          done > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            Welcome to release ${{ github.ref_name }} of ghqc!

            **Available packages:**
            - `ghqc-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz` - Linux x86_64 (glibc 2.28+)
            - `ghqc-${{ github.ref_name }}-aarch64-unknown-linux-gnu.tar.gz` - Linux aarch64 (glibc 2.28+)
            - `ghqc-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz` - macOS Apple Silicon
            - `ghqc-${{ github.ref_name }}-x86_64-apple-darwin.tar.gz` - macOS Intel
            - `ghqc-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip` - Windows x86_64

            **Quick install (Linux/macOS):**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/a2-ai/ghqctoolkit/main/scripts/install.sh | bash
            ```

            **Build Information:**
            - Linux binaries built on AlmaLinux 8 (glibc 2.28) for broad compatibility

            **Verify Installation:**
            ```bash
            ghqc --version
            ```

            **Checksums:**
            See `checksums.txt` for SHA256 checksums of all artifacts.
          token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: ${{ contains(github.ref, '-pre') || contains(github.ref, '-test') }}
          files: release-assets/*
