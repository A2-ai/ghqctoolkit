name: "POST /api/record/generate - no matching milestones"
description: "Returns 400 when requested milestones don't exist"

git_state: {}

request:
  method: POST
  path: "/api/record/generate"
  body:
    milestone_numbers: [999]
    tables_only: false
    output_path: "/tmp/test-output.pdf"
    context_files: []

response:
  status: 400
  body:
    match_type: partial
    fields:
      error: "No matching milestones found"
