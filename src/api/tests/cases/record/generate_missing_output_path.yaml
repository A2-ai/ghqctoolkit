name: "POST /api/record/generate - missing output_path"
description: "Returns 400 when output_path is empty"

git_state: {}

request:
  method: POST
  path: "/api/record/generate"
  body:
    milestone_numbers: [1]
    tables_only: false
    output_path: ""
    context_files: []

response:
  status: 400
  body:
    match_type: partial
    fields:
      error: "output_path is required"
