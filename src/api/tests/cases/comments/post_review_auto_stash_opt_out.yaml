name: "POST /api/issues/{number}/review - opt out of auto-stash"
description: "Successfully create a review without stashing when auto_stash is disabled"

fixtures:
  milestones: []
  issues:
    - type: mock
      number: 1
      title: "src/test.rs"
      body: |
        Quality check issue for src/test.rs
        
        ## Metadata
        initial qc commit: 456def789abc012345678901234567890123cdef
        git branch: main
        author: The Octocat <octocat@example.com>
      milestone: 1

git_state:
  dirty_files:
    - "src/test.rs"

request:
  method: POST
  path: "/api/issues/1/review"
  body:
    commit: "456def789abc012345678901234567890123cdef"
    auto_stash: false

response:
  status: 201
  body:
    match_type: exact
    value:
      comment_url: "https://github.com/test-owner/test-repo/issues/1#issuecomment-123"
      stash:
        status: "skipped"
        message: "Auto-stash disabled"

assert_write_calls:
  - type: PostComment
    comment_type: "ghqctoolkit::review::QCReview"
