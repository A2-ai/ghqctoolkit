name: "GET /api/files/content - dot segment rejected"
description: "Returns 400 when path contains '.' segments"

git_state: {}

request:
  method: GET
  path: "/api/files/content"
  query:
    path: "./src/main.rs"

response:
  status: 400
  body:
    match_type: partial
    fields:
      error: "Invalid path segment: '.'"
