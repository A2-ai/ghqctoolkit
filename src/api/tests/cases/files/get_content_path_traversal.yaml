name: "GET /api/files/content - path traversal rejected"
description: "Returns 400 when path contains '..' segments"

git_state: {}

request:
  method: GET
  path: "/api/files/content"
  query:
    path: "../etc/passwd"

response:
  status: 400
  body:
    match_type: partial
    fields:
      error: "Invalid path segment: '..'"
